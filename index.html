<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E9$Y</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--blue:#4a6cff;
--purple:#8a4dff;

/* tuned for your hero image */
--eyeY:47%;
--eyeLeftX:43%;
--eyeRightX:57%;
}

body{
margin:0;
font-family:Inter;
background:#05060a;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
position:relative;
height:120vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;

background:#05060a url("hero.png") center center / contain no-repeat;
}

/* AAA ENERGY FIELD */

.hero::before{
content:"";
position:absolute;
inset:-20%;
pointer-events:none;
z-index:2;

background:
radial-gradient(circle at 20% 40%,rgba(74,108,255,0.25),transparent 45%),
radial-gradient(circle at 80% 60%,rgba(138,77,255,0.22),transparent 50%),
radial-gradient(circle at 60% 20%,rgba(74,108,255,0.15),transparent 55%),
radial-gradient(circle at 40% 80%,rgba(138,77,255,0.18),transparent 55%);

filter:blur(25px);
opacity:.65;

animation:energyDrift 12s ease-in-out infinite alternate;
}

@keyframes energyDrift{
from{transform:translate(-30px,-15px) scale(1.05)}
to{transform:translate(30px,20px) scale(1.12)}
}

/* VIGNETTE */

.overlay{
position:absolute;
inset:0;
background:
radial-gradient(circle at center,rgba(0,0,0,.1),rgba(0,0,0,.65));
z-index:1;
}

/* HERO CONTENT */

.hero-content{
position:relative;
z-index:6;
max-width:900px;

transform:translateY(-95px);
}

/* MAIN HERO TEXT */

.hero p{
line-height:1.8;
margin:0;
opacity:.95;
}

/* SMALL E9$Y */

.hero h1{
position:relative;
z-index:1;

font-size:3.2rem;
letter-spacing:3px;
margin-bottom:10px;

background:linear-gradient(90deg,#fff,var(--blue),var(--purple));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:neonPulse 2.2s ease-in-out infinite;

text-shadow:
0 0 10px rgba(74,108,255,.6),
0 0 28px rgba(74,108,255,.5),
0 0 45px rgba(138,77,255,.35);
}

@keyframes neonPulse{

0%,100%{
text-shadow:
0 0 10px rgba(74,108,255,.5),
0 0 25px rgba(74,108,255,.4),
0 0 40px rgba(138,77,255,.25);
}

50%{
text-shadow:
0 0 14px rgba(74,108,255,.9),
0 0 38px rgba(74,108,255,.6),
0 0 65px rgba(138,77,255,.45);
}

}

/* LIGHTNING OUTLINE */

.hero h1::after{

content:"E9$Y";
position:absolute;
inset:0;
pointer-events:none;
z-index:0;

color:transparent;

-webkit-text-stroke:1.6px rgba(180,120,255,.9);

text-shadow:
0 0 8px rgba(138,77,255,.9),
0 0 18px rgba(138,77,255,.7),
0 0 35px rgba(74,108,255,.6);

background:
repeating-linear-gradient(
120deg,
rgba(255,255,255,0) 0px,
rgba(255,255,255,0) 7px,
rgba(200,150,255,.9) 8px,
rgba(255,255,255,0) 12px
),

repeating-linear-gradient(
35deg,
rgba(255,255,255,0) 0px,
rgba(255,255,255,0) 10px,
rgba(74,108,255,.9) 11px,
rgba(255,255,255,0) 16px
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

filter:brightness(1.4) contrast(1.2);

animation:lightningFlicker 1.1s infinite steps(2,end);

transform:translate(.8px,-.8px);
}

@keyframes lightningFlicker{

0%{opacity:.25}
8%{opacity:1}
16%{opacity:.4}
25%{opacity:.95}
50%{opacity:.5}
70%{opacity:.9}
100%{opacity:.25}

}

/* CTA BUTTON */

.hero .btn{

display:inline-block;
margin-top:55px;

transform:translateY(45px);

padding:14px 34px;

border:1px solid var(--blue);

background:rgba(74,108,255,.18);

color:white;

text-decoration:none;

border-radius:10px;

box-shadow:0 0 18px rgba(138,77,255,.35);

backdrop-filter:blur(10px);

transition:.25s;
}

.hero .btn:hover{

background:var(--blue);
color:black;

box-shadow:0 0 28px rgba(74,108,255,.9);

transform:translateY(45px) scale(1.05);

}

/* EYE GLOW */

.eye-glow{

position:absolute;

top:var(--eyeY);

width:26px;
height:26px;

border-radius:50%;

pointer-events:none;

z-index:3;

background:radial-gradient(circle,
rgba(255,255,255,.6),
rgba(138,77,255,.4),
transparent);

box-shadow:

0 0 10px rgba(255,255,255,.6),
0 0 22px rgba(74,108,255,.9),
0 0 35px rgba(138,77,255,.8);

animation:eyePulse 2.8s ease-in-out infinite;
}

.eye-left{
left:var(--eyeLeftX);
transform:translate(-50%,-50%);
}

.eye-right{
left:var(--eyeRightX);
transform:translate(-50%,-50%);
animation-delay:.25s;
}

@keyframes eyePulse{

0%,100%{
opacity:.55;
transform:translate(-50%,-50%) scale(.95);
}

50%{
opacity:1;
transform:translate(-50%,-50%) scale(1.15);
}

}

</style>
</head>

<body>

<section class="hero">

<div class="overlay"></div>

<div class="eye-glow eye-left"></div>
<div class="eye-glow eye-right"></div>

<div class="hero-content">

<h1>E9$Y</h1>

<p>
Some people want attention.<br>
Some want validation.<br>
<strong>I want success.</strong>
</p>

<a href="#music" class="btn">Enter the Signal</a>

</div>

</section>

</body>
</html>
